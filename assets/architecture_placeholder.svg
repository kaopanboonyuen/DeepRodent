<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="380" fill="#ffffff"/>

  <!-- Input -->
  <rect x="20" y="160" width="110" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="75" y="185" font-size="13" text-anchor="middle" fill="#0c4a6e">Input Frame</text>
  <text x="75" y="202" font-size="11" text-anchor="middle" fill="#0c4a6e">I ∈ R^(HxWx3)</text>

  <!-- Backbone -->
  <rect x="170" y="140" width="160" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="250" y="175" font-size="13" text-anchor="middle" fill="#4c1d95">Multi-Scale</text>
  <text x="250" y="192" font-size="13" text-anchor="middle" fill="#4c1d95">Backbone</text>
  <text x="250" y="212" font-size="11" text-anchor="middle" fill="#4c1d95">(P3, P4, P5 + F_agg)</text>

  <!-- Heads -->
  <rect x="380" y="20" width="150" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="455" y="45" font-size="13" text-anchor="middle" fill="#14532d">Detection Head</text>
  <text x="455" y="62" font-size="11" text-anchor="middle" fill="#14532d">B_t</text>

  <rect x="380" y="105" width="150" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="455" y="130" font-size="13" text-anchor="middle" fill="#713f12">OBB Head</text>
  <text x="455" y="147" font-size="11" text-anchor="middle" fill="#713f12">O_t = (x,y,w,h,θ)</text>

  <rect x="380" y="190" width="150" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="455" y="215" font-size="13" text-anchor="middle" fill="#7f1d1d">Segmentation Head</text>
  <text x="455" y="232" font-size="11" text-anchor="middle" fill="#7f1d1d">M_t</text>

  <rect x="380" y="275" width="150" height="60" rx="8" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="455" y="300" font-size="13" text-anchor="middle" fill="#312e81">Temporal Embed.</text>
  <text x="455" y="317" font-size="11" text-anchor="middle" fill="#312e81">E_t</text>

  <!-- Post-processing -->
  <rect x="620" y="140" width="230" height="100" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="735" y="165" font-size="13" text-anchor="middle" fill="#0f172a">Post-Processing Engine</text>
  <text x="735" y="184" font-size="11" text-anchor="middle" fill="#334155">Trajectory · Occupancy Heatmap</text>
  <text x="735" y="200" font-size="11" text-anchor="middle" fill="#334155">Behavior State (groom/rear/locomote)</text>

  <!-- Arrows -->
  <line x1="130" y1="190" x2="168" y2="190" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="165" x2="378" y2="80" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="180" x2="378" y2="135" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="200" x2="378" y2="220" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="215" x2="378" y2="300" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="530" y1="50" x2="618" y2="160" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="135" x2="618" y2="175" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="220" x2="618" y2="195" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="305" x2="618" y2="210" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="450" y="365" font-size="12" text-anchor="middle" fill="#6b7280">DeepRodent — Teerapong Panboonyuen</text>
</svg>
